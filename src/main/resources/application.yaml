spring:
  application:
    name: ldy-ai-code-mother
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ldy_ai_code_mother
    username: root
    password: root
  profiles:
    active: local
  data:
    redis:
      host: localhost
      port: 6379
      database: 0
      password:
      ttl: 3600  # 缓存过期时间（秒）
  session:
    store-type: redis
    # session 30 天过期
    timeout: 2592000
server:
  port: 8123
  servlet:
    context-path: /api
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000
springdoc:
  group-configs:
    - group: 'default'
      packages-to-scan: com.ldy.ldyaicodemother.controller
knife4j:
  enable: true
  setting:
    language: zh_cn
langchain4j:
  community:
    redis:
      # 项目使用 RedisChatMemoryStore 手动配置，不需要 Embedding Store 自动装配
      enabled: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
groups:
  - name: ai_model_alerts
    rules:
      - alert: HighErrorRate
        expr: sum(rate(ai_model_requests_total{status="error"}[5m])) / sum(rate(ai_model_requests_total[5m])) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI模型错误率过高"
          description: "错误率已超过10%，持续5分钟"
      - alert: SlowResponse
        expr: avg(ai_model_response_duration_seconds) > 30
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "AI模型响应时间过长"
          description: "平均响应时间超过30秒"

